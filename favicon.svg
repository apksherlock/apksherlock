<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="apksherlock">
  <defs>
    <linearGradient id="rim" x1="6" y1="5" x2="26" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00f2ff" />
      <stop offset="0.55" stop-color="#ff3dc8" />
      <stop offset="1" stop-color="#e91c3c" />
    </linearGradient>
    <linearGradient id="face" x1="16" y1="9" x2="16" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a0610" />
      <stop offset="1" stop-color="#0a0206" />
    </linearGradient>
  </defs>
  <!-- Deep base + soft vignette -->
  <rect width="32" height="32" rx="9" fill="#100208" />
  <rect width="32" height="32" rx="9" fill="url(#face)" opacity="0.92" />
  <!-- Framed diamond (echoes nav sigil) -->
  <rect
    x="3.5"
    y="3.5"
    width="25"
    height="25"
    rx="7.5"
    fill="none"
    stroke="url(#rim)"
    stroke-width="1.35"
    opacity="0.88"
  />
  <path
    d="M16 8.2 23.8 16 16 23.8 8.2 16Z"
    fill="none"
    stroke="url(#rim)"
    stroke-width="1.85"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Tiny inner accent — reads as a “signal” at favicon size -->
  <circle cx="16" cy="16" r="1.65" fill="#00f2ff" opacity="0.92" />
</svg>
